<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LEARNING - Hệ Thống Gợi Ý Bài Tập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .tab-active { color: #2563eb; border-bottom: 3px solid #2563eb; font-weight: bold; }
        .tab-inactive { color: #4b5563; font-weight: 500; }
        .tab-inactive:hover { color: #2563eb; }
        .difficulty-1 { border-left: 4px solid #22c55e; } 
        .difficulty-2 { border-left: 4px solid #eab308; } 
        .difficulty-3 { border-left: 4px solid #ef4444; } 
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800">

    <div id="login-section" class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center border-t-4 border-blue-600">
            <div class="text-blue-600 text-5xl mb-4"><i class="fa-solid fa-robot"></i></div>
            <h2 class="text-2xl font-bold mb-6 text-gray-800">ĐĂNG NHẬP </h2>
            <input type="text" id="username" placeholder="Tên đăng nhập (Mã SV/GV)" class="w-full px-4 py-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full px-4 py-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <p id="login-error" class="text-red-500 text-sm mb-4 hidden font-semibold"></p>
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="app-section" class="hidden min-h-screen">
        
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                <div class="flex items-center text-blue-600">
                    <i class="fa-solid fa-robot text-4xl mr-3"></i>
                    <h1 class="text-2xl font-black tracking-wider">AI LEARNING</h1>
                </div>
                
                <div class="flex items-center space-x-6">
                    <button onclick="openChangePwModal()" class="text-gray-600 hover:text-blue-600 font-bold text-sm flex items-center transition-colors">
                        <i class="fa-solid fa-key mr-2"></i> Đổi mật khẩu
                    </button>
                    
                    <div class="bg-gray-50 border py-2 px-5 rounded-full flex items-center shadow-sm">
                        <div class="text-right mr-4">
                            <p id="user-fullname" class="text-sm font-bold text-gray-800"></p>
                            <p id="user-role-text" class="text-xs text-gray-500 uppercase tracking-widest font-semibold"></p>
                        </div>
                        <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition-colors" title="Đăng xuất">
                            <i class="fa-solid fa-right-from-bracket text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            
            <div id="teacher-view" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800 flex items-center">
                        <i class="fa-solid fa-chalkboard-user text-blue-600 mr-3"></i> Báo cáo lớp học
                    </h2>
                    <div class="bg-red-50 text-red-600 px-5 py-2 rounded-lg font-bold border border-red-100 flex items-center shadow-sm">
                        Cảnh báo: <span id="weak-students-count" class="mx-2 text-2xl">0</span> SV yếu
                    </div>
                </div>
                <div id="classes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="student-view" class="hidden">
                <div class="bg-white rounded-xl shadow-sm mb-8 flex overflow-hidden border border-gray-200">
                    <button onclick="switchTab('CTDLGT')" id="tab-CTDLGT" class="flex-1 py-4 text-center tab-inactive transition-colors">Cấu trúc dữ liệu & Giải thuật</button>
                    <button onclick="switchTab('KTLT')" id="tab-KTLT" class="flex-1 py-4 text-center tab-inactive transition-colors">Kỹ thuật lập trình</button>
                    <button onclick="switchTab('OOP')" id="tab-OOP" class="flex-1 py-4 text-center tab-inactive transition-colors">Lập trình hướng đối tượng</button>
                    <button onclick="switchTab('NMLT')" id="tab-NMLT" class="flex-1 py-4 text-center tab-inactive transition-colors bg-blue-50 text-blue-600 font-bold border-b-2 border-blue-600">Nhập môn lập trình</button>
                    <button onclick="switchTab('HISTORY')" id="tab-HISTORY" class="px-6 py-4 text-center tab-inactive bg-gray-50 border-l hover:bg-gray-100 transition-colors"><i class="fa-solid fa-clock-rotate-left mr-2"></i> Lịch sử</button>
                </div>

                <div class="flex flex-col lg:flex-row gap-8">
                    <div id="score-sidebar" class="w-full lg:w-1/3 space-y-6">
                        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-yellow-400"></div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">HỌC LỰC </p>
                            <div class="flex items-baseline mb-2">
                                <span id="hl-score" class="text-6xl font-black text-gray-800">--</span>
                                <span class="text-gray-400 font-bold ml-1">/10</span>
                            </div>
                            <span id="hl-rank" class="inline-block px-3 py-1 bg-green-100 text-green-700 font-bold text-sm rounded-full">Đang tải...</span>
                        </div>

                        <div class="bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl p-6 shadow-lg text-white relative overflow-hidden">
                            <i class="fa-solid fa-microchip absolute -bottom-6 -right-6 text-9xl opacity-20"></i>
                            <h3 class="text-2xl font-bold mb-1 relative z-10">AI Đánh Giá</h3>
                            <p class="text-blue-100 text-sm mb-6 relative z-10">Năng lực cập nhật liên tục</p>
                            
                            <div class="bg-white/10 rounded-xl p-4 border border-white/20 relative z-10 backdrop-blur-sm flex justify-between items-end">
                                <div>
                                    <p class="text-blue-100 text-sm mb-1">Điểm năng lực môn này:</p>
                                    <span id="ai-score" class="text-5xl font-black">--</span>
                                </div>
                                <i class="fa-solid fa-chart-line text-4xl text-white/50"></i>
                            </div>
                        </div>
                    </div>

                    <div class="w-full lg:w-2/3">
                        <div id="recommendation-container">
                            <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                                <i class="fa-solid fa-pen text-purple-500 mr-3"></i> LỘ TRÌNH GỢI Ý RIÊNG CHO BẠN
                            </h3>
                            <div id="exercise-list" class="space-y-4"></div>
                        </div>

                        <div id="history-container" class="hidden">
                            <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                                <i class="fa-solid fa-clock text-blue-500 mr-3"></i> LỊCH SỬ LÀM BÀI
                            </h3>
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
